<!DOCTYPE html>

  <main style="min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(160deg,#0a0f2e 0%,#001a6e 55%,#003fcc 100%); padding:120px 20px 80px;">
    <div style="max-width:520px; width:100%; text-align:center;">

      <div style="width:80px; height:80px; background:rgba(3,199,90,0.12); border:2px solid rgba(3,199,90,0.35); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 28px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#03c75a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>

      <h1 style="font-size:clamp(1.8rem,5vw,2.4rem); font-weight:900; color:#fff; margin-bottom:16px; letter-spacing:-0.5px;">예약이 완료되었습니다</h1>

      <p id="bookingIdMsg" style="display:none; font-size:0.9rem; color:rgba(255,255,255,0.5); margin-bottom:10px;"></p>

      <p style="font-size:1rem; color:rgba(255,255,255,0.6); line-height:1.8; margin-bottom:40px;">

      <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
        <a href="index.html" style="background:rgba(255,255,255,0.08); color:#fff; border:1px solid rgba(255,255,255,0.2); padding:14px 28px; border-radius:10px; font-weight:700; font-size:0.95rem; text-decoration:none; transition:background 0.2s;">
          홈으로
        </a>
        <a href="tel:0507-1304-6329" style="background:#03c75a; color:#fff; padding:14px 28px; border-radius:10px; font-weight:800; font-size:0.95rem; text-decoration:none; transition:background 0.2s;">
          전화 문의

  <footer class="footer footer--custom">

  <script>
    // 예약번호 표시
    (function () {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      if (id) {
        const el = document.getElementById('bookingIdMsg');
        el.textContent = '예약번호: #' + id;
        el.style.display = 'block';
      }
    })();

    // 네이버 전환 추적 — 중복 실행 방지
    (function () {
      if (sessionStorage.getItem('_naverConvFired')) return;
      sessionStorage.setItem('_naverConvFired', '1');

      function fireConversion() {
        if (window.wcs && typeof wcs.trans === 'function') {
          var _conv = { type: 'purchase' };
          wcs.trans(_conv);
          console.log('네이버 전환 발생');
        } else {
          console.warn('[Naver WCS] wcs 미로드 — 전환 이벤트 미실행');
        }
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', fireConversion);
      } else {
        fireConversion();
      }
    })();

    // 헤더 스크롤
    const header = document.getElementById('header');
    window.addEventListener('scroll', function () {
      if (!header) return;
      header.classList.toggle('scrolled', window.scrollY > 60);
    });
  </script>

</body>
